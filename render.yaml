services:
  - type: web
    name: resume-screener-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: resume-screener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: resume-screener-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ENDPOINT
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: ENVIRONMENT
        value: production

databases:
  - name: resume-screener-db
    plan: starter
    databaseName: resume_screener
    user: resume_screener

  - name: resume-screener-redis
    type: redis
    plan: starter
